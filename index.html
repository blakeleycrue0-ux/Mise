<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>MISE — let's get you set up</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  :root{--ink:#14213D;--inkSoft:#5B6B85;--paper:#F4F6FA;--oliveDeep:#0F1830;--sage:#8FA8C9;--flame:#1B3B8C;--flameSoft:#3E63B5;--display:'Bricolage Grotesque',sans-serif;--body:'Hanken Grotesk',system-ui,sans-serif;--mono:'Space Mono',monospace;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:#fff;background:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(62,99,181,.4),transparent 60%),rgba(11,18,38,1);}
  .mono{font-family:var(--mono);} .display{font-family:var(--display);}
  .wrap{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:30px 22px 30px;position:relative;}
  .press{transition:transform .12s;cursor:pointer;} .press:active{transform:scale(.94);}
  .btn{height:56px;border-radius:18px;border:1px solid rgba(255,255,255,.4);cursor:pointer;background:linear-gradient(135deg,var(--flame),var(--flameSoft));color:#fff;font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:1px;display:inline-flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 28px rgba(27,59,140,.35);width:100%;}
  .bar{height:5px;background:rgba(255,255,255,.15);border-radius:100px;overflow:hidden;margin-bottom:24px;}
  .barfill{height:100%;background:linear-gradient(90deg,var(--flameSoft),var(--sage));transition:width .4s;}
  .opt{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;cursor:pointer;text-align:left;color:#fff;margin-bottom:11px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);}
  .opt.sel{border-color:rgba(143,168,201,.95);background:rgba(62,99,181,.42);}
  .back{position:absolute;top:24px;left:20px;width:38px;height:38px;border-radius:100px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;display:grid;place-items:center;cursor:pointer;z-index:2;}
  @keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
  .up{animation:up .45s cubic-bezier(.2,.7,.2,1) both;}
  input{font-family:inherit;}
</style>
</head>
<body>
<div class="wrap" id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const BRAND="MISE";
const ICONS={"arrow-right":'<path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>',check:'<path d="M20 6 9 17l-5-5"/>',"chevron-left":'<path d="m15 18-6-6 6-6"/>',flame:'<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.07-2.14-.22-4.05 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.15.43-2.29 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',sparkles:'<path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/>'};
const ic=(n,o={})=>{const s=o.s||18;return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="${o.f||'none'}" stroke="currentColor" stroke-width="${o.sw||2}" stroke-linecap="round" stroke-linejoin="round"${o.c?` style="color:${o.c}"`:''}>${ICONS[n]||''}</svg>`;};
function logo(s){return `<div style="position:relative;width:${s}px;height:${s}px;border-radius:100px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.5);display:grid;place-items:center;overflow:hidden;"><div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(62,99,181,.6),rgba(143,168,201,.3));"></div><svg viewBox="0 0 24 24" width="${Math.round(s*.5)}" height="${Math.round(s*.5)}" style="position:relative;" fill="#fff">${ICONS.flame}</svg></div>`;}

let step=0;
const A={diet:null,goal:null,skill:null,referral:null,trackHealth:null,weight:null,target:null};
const TOTAL=8;

function wrap(inner,opts){opts=opts||{};const root=document.getElementById("root");root.innerHTML=(opts.back?`<button class="back press" onclick="back()">${ic("chevron-left",{s:18})}</button>`:"")+(opts.prog!=null?`<div class="bar" style="margin-top:${opts.back?44:0}px;"><div class="barfill" style="width:${Math.round(opts.prog*100)}%;"></div></div>`:`<div style="height:${opts.back?44:0}px;"></div>`)+`<div style="flex:1;display:flex;flex-direction:column;" class="up">${inner}</div>`;}
function cards(key,list){return list.map(([id,label,emo])=>{const sel=A[key]===id;return `<button class="opt press ${sel?'sel':''}" onclick="setA('${key}','${id}')">${emo?`<span style="font-size:24px;">${emo}</span>`:''}<span style="font-weight:600;font-size:16px;flex:1;">${label}</span>${sel?ic("check",{s:18,sw:3,c:'var(--sage)'}):''}</button>`;}).join("");}
function q(key,title,sub,list,prog){const cur=A[key];const inner=`<h1 class="display" style="font-weight:800;font-size:27px;letter-spacing:-.6px;margin-bottom:6px;">${title}</h1>${sub?`<p style="font-size:15px;color:rgba(255,255,255,.6);margin-bottom:22px;">${sub}</p>`:'<div style="height:20px;"></div>'}<div style="flex:1;">${cards(key,list)}</div><button class="btn press" onclick="next()" style="opacity:${cur?1:.4};pointer-events:${cur?'auto':'none'};">CONTINUE ${ic("arrow-right",{s:18})}</button>`;wrap(inner,{prog,back:true});}

function planLines(){
  const g={cook:"Master the fundamentals, one technique at a time",healthier:"Fresh, balanced dishes that still taste like a treat",lose:"Lighter cooking that doesn't feel like a diet",others:"Crowd-pleasers you'll be proud to serve"}[A.goal]||"A cooking plan built around you";
  const d={all:"Everything's on the table",vegetarian:"Veg-forward dishes front and centre",pescatarian:"Seafood and veg, nicely balanced",vegan:"100% plant-based picks"}[A.diet]||"Dishes that fit how you eat";
  const s={new:"Starting from the very basics",some:"Levelling up your everyday cooking",confident:"Sharper technique and new challenges"}[A.skill]||"Pitched at your level";
  return [["🎯",g],["🥘",d],["📈",s]];
}

function screen(){
  if(step===0){wrap(`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">${logo(78)}<h1 class="display" style="font-weight:800;font-size:36px;letter-spacing:-1px;margin:22px 0 10px;">Let's get it.</h1><p style="font-size:16px;color:rgba(255,255,255,.75);line-height:1.5;max-width:300px;">A few quick questions and ${BRAND} builds a cooking plan around you. 30 seconds.</p></div><button class="btn press" onclick="next()">START ${ic("arrow-right",{s:18})}</button><button class="press" onclick="location.href='login.html'" style="margin-top:14px;background:none;border:none;color:rgba(255,255,255,.6);font-family:var(--mono);font-size:11.5px;font-weight:700;letter-spacing:.5px;cursor:pointer;">I ALREADY HAVE AN ACCOUNT → LOG IN</button>`,{});return;}
  if(step===1){q("diet","How do you eat?","We'll surface dishes that fit you first.",[["all","Everything","🍽️"],["vegetarian","Vegetarian","🥕"],["pescatarian","Pescatarian","🐟"],["vegan","Vegan","🌱"]],.12);return;}
  if(step===2){q("goal","What's your main goal?","",[["cook","Learn to cook properly","👨‍🍳"],["healthier","Eat healthier","🥗"],["lose","Lose a bit of weight","📉"],["others","Cook for people I love","🍷"]],.26);return;}
  if(step===3){q("skill","How are you in the kitchen?","",[["new","Just starting out","🐣"],["some","I can get by","🔪"],["confident","Pretty confident","🔥"]],.40);return;}
  if(step===4){q("referral","How did you hear about us?","",[["tiktok","TikTok","📱"],["instagram","Instagram","📸"],["friend","A friend told me","🫶"],["appstore","The App Store","🍎"],["other","Somewhere else","✨"]],.54);return;}
  if(step===5){wrap(`<div style="flex:1;display:flex;flex-direction:column;justify-content:center;"><span class="mono" style="font-size:11px;letter-spacing:2px;color:var(--sage);font-weight:700;">WHY IT WORKS</span><h1 class="display" style="font-weight:800;font-size:27px;letter-spacing:-.6px;margin:8px 0 24px;">Guided cooks stick with it</h1><div style="display:flex;align-items:flex-end;gap:24px;height:190px;margin-bottom:16px;"><div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;height:100%;justify-content:flex-end;"><div style="width:100%;height:32%;background:rgba(255,255,255,.16);border-radius:14px 14px 0 0;"></div><span class="mono" style="font-size:11px;color:rgba(255,255,255,.6);text-align:center;">On your<br/>own</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;height:100%;justify-content:flex-end;"><div style="width:100%;height:100%;background:linear-gradient(180deg,var(--flameSoft),var(--flame));border-radius:14px 14px 0 0;box-shadow:0 0 32px rgba(62,99,181,.55);position:relative;"><span class="mono" style="position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:700;">3x</span></div><span class="mono" style="font-size:11px;color:#fff;font-weight:700;text-align:center;">With<br/>${BRAND}</span></div></div><p style="font-size:12.5px;color:rgba(255,255,255,.45);line-height:1.5;">Illustrative — guided, step-by-step learning vs figuring it out alone.</p></div><button class="btn press" onclick="next()">MAKES SENSE ${ic("arrow-right",{s:18})}</button>`,{prog:.62,back:true});return;}
  if(step===6){const t=A.trackHealth;wrap(`<h1 class="display" style="font-weight:800;font-size:27px;letter-spacing:-.6px;margin-bottom:6px;">Any health goals?</h1><p style="font-size:15px;color:rgba(255,255,255,.6);margin-bottom:22px;">Optional — ${BRAND} is cooking-first. Skip if you like.</p><div style="display:flex;gap:12px;margin-bottom:18px;"><button class="opt press ${t===true?'sel':''}" style="flex:1;justify-content:center;margin:0;" onclick="setHealth(true)">Yes, track it</button><button class="opt press ${t===false?'sel':''}" style="flex:1;justify-content:center;margin:0;" onclick="setHealth(false)">Just cooking</button></div>${t===true?`<div style="display:flex;gap:12px;margin-bottom:10px;"><div style="flex:1;"><label class="mono" style="font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.6);">CURRENT (KG)</label><input id="wNow" type="number" value="${A.weight||''}" placeholder="—" style="width:100%;margin-top:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:13px;color:#fff;font-size:16px;outline:none;"/></div><div style="flex:1;"><label class="mono" style="font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.6);">GOAL (KG)</label><input id="wGoal" type="number" value="${A.target||''}" placeholder="—" style="width:100%;margin-top:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.22);border-radius:12px;padding:13px;color:#fff;font-size:16px;outline:none;"/></div></div>`:''}<div style="flex:1;"></div><button class="btn press" onclick="healthNext()" style="opacity:${t===null?.4:1};pointer-events:${t===null?'none':'auto'};">CONTINUE ${ic("arrow-right",{s:18})}</button>`,{prog:.74,back:true});return;}
  if(step===7){wrap(`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;"><div style="width:90px;height:90px;border-radius:100px;border:3px solid rgba(255,255,255,.15);border-top-color:var(--sage);animation:spin 1s linear infinite;"></div><h1 class="display" style="font-weight:800;font-size:26px;margin:28px 0 8px;">Building your plan…</h1><p style="font-size:15px;color:rgba(255,255,255,.7);">Tailoring dishes to your answers</p></div>`,{prog:.88});setTimeout(()=>{if(step===7)next();},2600);return;}
  // step 8 = plan reveal
  const lines=planLines();
  wrap(`<div style="flex:1;"><span class="mono" style="font-size:11px;letter-spacing:2px;color:var(--sage);font-weight:700;">YOUR PLAN IS READY</span><h1 class="display" style="font-weight:800;font-size:28px;letter-spacing:-.7px;margin:8px 0 20px;">Built around you ${ic("sparkles",{s:22,c:'var(--sage)',f:'var(--sage)'})}</h1>${lines.map(([e,t])=>`<div style="display:flex;gap:14px;align-items:center;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:15px 16px;margin-bottom:11px;"><span style="font-size:24px;">${e}</span><span style="font-size:15px;line-height:1.4;font-weight:500;">${t}</span></div>`).join("")}</div><button class="btn press" onclick="finish()">${ic("flame",{s:18,f:'#fff'})} CREATE MY ACCOUNT</button>`,{prog:1,back:true});
}
function render(){screen();}
function next(){step++;render();window.scrollTo(0,0);}
function back(){if(step>0){step--;if(step===7)step--;}render();window.scrollTo(0,0);}
function setA(k,id){A[k]=id;render();}
function setHealth(v){A.trackHealth=v;render();}
function healthNext(){if(A.trackHealth){const a=document.getElementById("wNow"),b=document.getElementById("wGoal");if(a)A.weight=a.value||null;if(b)A.target=b.value||null;}next();}
function finish(){try{localStorage.setItem("mise_answers",JSON.stringify({...A,companion:{name:"Chef"}}));}catch(e){}location.href="login.html";}

// returning users who've already onboarded skip straight on
try{if(localStorage.getItem("mise_onboarded")==="1"){location.href="home.html";}}catch(e){}
render();
</script>
</body>
</html>
