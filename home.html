function getResults(){const q=S.query.trim().toLowerCase();let r=DISHES.filter(d=>{const mq=!q||d.title.toLowerCase().includes(q)||d.blurb.toLowerCase().includes(q)||d.tag.toLowerCase().includes(q);return mq&&(S.meal==="all"||d.meal===S.meal)&&(S.flavor==="all"||d.flavor===S.flavor);});if(S.diet!=="all"){r=r.slice().sort((a,b)=>{const am=dishDiets(a).includes(S.diet)?0:1,bm=dishDiets(b).includes(S.diet)?0:1;return am-bm;});}return r;}
function resultsHTML(){const r=getResults();let out=`<div class="mono" style="font-size:11px;color:var(--inkSoft);margin-bottom:14px;letter-spacing:1px;">${r.length} ${r.length===1?"DISH":"DISHES"}</div>`;if(r.length===0)return out+`<div class="up glasspanel" style="text-align:center;padding:30px 20px;border-radius:20px;"><div class="display" style="font-weight:700;font-size:19px;color:var(--oliveDeep);">Nothing here yet</div><div style="font-size:14.5px;color:var(--inkSoft);margin-top:6px;">Try a different filter or clear your search.</div></div>`;return out+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">${r.map(d=>miniCard(d,"100%")).join("")}</div>`;}
function savedHTML(){const list=DISHES.filter(d=>S.saved.has(d.id));return `<div style="min-height:70vh;"><div class="glasspanel up" style="margin:14px 16px 0;border-radius:26px;padding:24px 20px;display:flex;align-items:center;justify-content:space-between;"><div><span class="eyebrow">Your kitchen</span><h2 class="display" style="font-weight:800;font-size:32px;margin:6px 0 0;letter-spacing:-.8px;color:var(--oliveDeep);">Saved</h2></div>${list.length?`<div class="mono" style="font-weight:700;font-size:34px;color:var(--flame);">${String(list.length).padStart(2,"0")}</div>`:""}</div>${list.length===0?`<div class="up glasspanel" style="margin:20px 16px;padding:40px 30px;text-align:center;border-radius:24px;"><div style="width:72px;height:72px;border-radius:100px;background:rgba(167,176,136,.3);border:1px solid rgba(255,255,255,.6);display:grid;place-items:center;margin:0 auto 18px;">${ic("bookmark",{s:30,c:"var(--olive)",sw:2})}</div><div class="display" style="font-weight:700;font-size:20px;color:var(--oliveDeep);">Nothing saved yet</div><div style="font-size:15px;color:var(--inkSoft);margin-top:8px;line-height:1.5;max-width:260px;margin-left:auto;margin-right:auto;">Tap the bookmark on any dish to keep it here for when you're ready to cook.</div></div>`:`<div style="display:flex;flex-direction:column;gap:18px;padding:18px 16px 24px;">${list.map(d=>bigCard(d)).join("")}</div>`}</div>`;}
function mineHTML(){const list=S.customRecipes;return `<div style="min-height:70vh;"><div class="glasspanel up" style="margin:14px 16px 0;border-radius:26px;padding:24px 20px;display:flex;align-items:center;justify-content:space-between;"><div><span class="eyebrow">Private to you</span><h2 class="display" style="font-weight:800;font-size:32px;margin:6px 0 0;letter-spacing:-.8px;color:var(--oliveDeep);">My recipes</h2></div><button class="press" onclick="openEditor(null)" style="width:46px;height:46px;border-radius:100px;background:rgba(27,59,140,.9);border:1px solid rgba(255,255,255,.4);color:#fff;display:grid;place-items:center;cursor:pointer;box-shadow:0 6px 16px rgba(27,59,140,.3);">${ic("plus",{s:20,sw:2.6})}</button></div>${S.customLoading?`<div class="mono" style="text-align:center;padding:60px 20px;color:var(--inkSoft);font-size:13px;">Loading your recipes…</div>`:list.length===0?`<div class="up glasspanel" style="margin:20px 16px;padding:40px 30px;text-align:center;border-radius:24px;"><div style="width:72px;height:72px;border-radius:100px;background:rgba(167,176,136,.3);border:1px solid rgba(255,255,255,.6);display:grid;place-items:center;margin:0 auto 18px;">${ic("chef",{s:30,c:"var(--olive)",sw:2})}</div><div class="display" style="font-weight:700;font-size:20px;color:var(--oliveDeep);">No recipes yet</div><div style="font-size:15px;color:var(--inkSoft);margin-top:8px;line-height:1.5;max-width:260px;margin-left:auto;margin-right:auto;">Write up a dish, a technique, or a family recipe. Only you can see it.</div><button class="press btn-flame" onclick="openEditor(null)" style="margin-top:20px;width:auto;padding:0 22px;">${ic("plus",{s:17,f:"#fff"})} NEW RECIPE</button></div>`:`<div style="display:flex;flex-direction:column;gap:18px;padding:18px 16px 24px;">${list.map(d=>bigCard(d,true)).join("")}</div>`}</div>`;}

    </div>

  </div>`;

async function syncProfile(user){
  if(!supa||!user)return;
  try{
    let {data:profile}=await supa.from("profiles").select("*").eq("id",user.id).maybeSingle();
    if(!profile){const ins=await supa.from("profiles").insert({id:user.id,email:user.email,diet:"all"}).select().maybeSingle();profile=ins.data;}
    if(profile){
      S.diet=profile.diet||"all";
      if(profile.prefs){const p=profile.prefs;if(p.companion&&p.companion.animal)S.companion=p.companion;S.answers={...S.answers,goal:p.goal||null,skill:p.skill||null,trackHealth:(p.trackHealth!==undefined?p.trackHealth:null),weight:p.weight||null,target:p.target||null,diet:S.diet};}
    }
  }catch(e){}
  await loadCustomRecipes(user);
  render();
}

    if(S.editorId){res=await supa.from("custom_recipes").update(row).eq("id",S.editorId).select().maybeSingle();}
    else{res=await supa.from("custom_recipes").insert(row).select().maybeSingle();}
    if(res.error){appToast("Couldn't save — "+res.error.message);S.editorSaving=false;render();return;}
    await loadCustomRecipes(user);
    S.editorSaving=false;S.showEditor=false;S.editorId=null;S.editorDraft=null;S.tab="mine";S.openId=null;S.openCustom=null;
    appToast("Recipe saved");nav();
  }catch(e){S.editorSaving=false;appToast("Something went wrong saving");render();}
}
async function deleteCustom(id){
  if(!supa){return;}
  try{await supa.from("custom_recipes").delete().eq("id",id);const {data:{user}}=await supa.auth.getUser();await loadCustomRecipes(user);S.openCustom=null;S.tab="mine";appToast("Recipe deleted");nav();}catch(e){appToast("Couldn't delete");render();}
}
async function initAuth(){
  if(typeof window.supabase==="undefined"){render();return;}
  supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  try{const a=JSON.parse(localStorage.getItem("mise_answers")||"null");if(a){S.answers={...S.answers,...a};if(a.diet)S.diet=a.diet;if(a.companion&&a.companion.name)S.companion=a.companion;}}catch(e){}
  const {data:{session}}=await supa.auth.getSession();
  if(!session||!session.user){location.href="index.html";return;}
  S.loggedIn=true;S.userEmail=session.user.email;
  await syncProfile(session.user);
  supa.auth.onAuthStateChange((ev)=>{if(ev==="SIGNED_OUT")location.href="index.html";});
  render();
}
function scanGo(){S.scanPhase="scanning";render();setTimeout(()=>{S.scanPhase="results";render();},1700);}
function toggleFound(k){S.found[k]=!S.found[k];render();}
function openFromScan(id){S.showScan=false;S.openId=id;S.servings=null;nav();}
function goCategory(m){S.meal=m;S.flavor="all";S.query="";S.tab="search";S.openId=null;nav();}
function setMeal(m){S.meal=m;render();}
function setFlavor(f){S.flavor=f;render();}
function clearSearch(){S.query="";render();}
function onSearch(v){S.query=v;document.getElementById("results").innerHTML=resultsHTML();}
function startCook(id,custom){if(!ensureLogin())return;S.cooking=id;S.cookingCustom=!!custom;S.cookStep=0;render();}
function exitCook(){clearInterval(T.id);S.cooking=null;render();}
function cookNext(){clearInterval(T.id);S.cookStep++;render();}
function cookPrev(){clearInterval(T.id);S.cookStep--;render();}
function mountTimer(){const d=S.cookingCustom?C(S.cooking):D(S.cooking),step=d.steps[S.cookStep];if(!step||step.timer<=0)return;clearInterval(T.id);T.total=step.timer;T.left=step.timer;T.running=false;T.done=false;paintTimer();}
function paintTimer(){const dg=document.getElementById("t-digits"),ring=document.getElementById("t-ring"),btn=document.getElementById("t-btn");if(!dg)return;const R=52,CIRC=2*Math.PI*R,pct=T.total?T.left/T.total:0;dg.textContent=T.done?"DONE":fmt(T.left);dg.style.color=T.done?"var(--sage)":"#fff";dg.style.animation=T.done?"pulse 1s infinite":"none";ring.setAttribute("stroke",T.done?"var(--sage)":"var(--flame)");ring.setAttribute("stroke-dashoffset",CIRC*(1-pct));btn.innerHTML=T.running?`${ic("pause",{s:15})} PAUSE`:`${ic("play",{s:15,f:"#fff"})} ${T.done?"AGAIN":"START"}`;}
function toggleTimer(){if(T.done){T.left=T.total;T.done=false;}T.running=!T.running;clearInterval(T.id);if(T.running){T.id=setInterval(()=>{T.left--;if(T.left<=0){T.left=0;T.running=false;T.done=true;clearInterval(T.id);beep();try{navigator.vibrate&&navigator.vibrate(400);}catch(e){}}paintTimer();},1000);}paintTimer();}
function resetTimer(){clearInterval(T.id);T.left=T.total;T.running=false;T.done=false;paintTimer();}
let toastT;
function appToast(msg){const t=document.getElementById("toast");t.textContent=msg||"🚀 Launching soon — follow for the drop";t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}
(function(){const msg=`📱 Download the ${BRAND} app — cook along with every video  •  new dish every week  •  ${HANDLE}  •  `;document.getElementById("mq").innerHTML=`<span>${msg}</span><span>${msg}</span>`;})();
initAuth();
</script>
