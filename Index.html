  .lift{transition:transform .25s cubic-bezier(.2,.7,.2,1);cursor:pointer;}

  @media(hover:hover){.lift:hover{transform:translateY(-4px);}}
  .press{transition:transform .12s;cursor:pointer;} .press:active{transform:scale(.94);}

  @keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @keyframes pop{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:none;}}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
  @keyframes sheet{from{transform:translateY(100%);}to{transform:none;}}
  @keyframes scanline{0%{top:6%;}100%{top:88%;}}
  .up{animation:up .5s cubic-bezier(.2,.7,.2,1) both;}
  .pop{animation:pop .35s cubic-bezier(.2,.7,.2,1) both;}

const cover=(d,h,r,fs)=>`<div style="position:relative;height:${h}px;border-radius:${r}px;overflow:hidden;background:linear-gradient(135deg,${d.hue[0]},${d.hue[1]});display:flex;flex-direction:column;justify-content:flex-end;padding:16px;">
  <div style="position:absolute;inset:0;opacity:.5;background-image:radial-gradient(circle at 20% 15%,rgba(255,255,255,.25),transparent 45%);"></div>
  <div style="position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.92);background:rgba(0,0,0,.22);padding:4px 9px;border-radius:100px;">${d.tag}</div>
  <div style="position:relative;font-family:var(--display);font-weight:700;color:#fff;line-height:1.02;font-size:${fs}px;letter-spacing:-.5px;text-shadow:0 1px 12px rgba(0,0,0,.25);">${d.title}</div>
</div>`;
const meta=(d)=>`<div class="meta"><span class="i">${ic("clock",{s:13,sw:2.4})} ${d.minutes} min</span><span style="opacity:.4">·</span><span class="i">${ic("flame",{s:13,sw:2.4})} ${d.level}</span></div>`;

/* ----------------------------- SCREENS ------------------------------ */
function screenHTML(){
  if(S.openId) return detailHTML(D(S.openId));
  if(S.tab==="home") return homeHTML();
  if(S.tab==="search") return searchHTML();
  if(S.tab==="saved") return savedHTML();
  if(S.tab==="about") return aboutHTML();
}

function miniCard(d,w){return `<div class="lift" onclick="openDish('${d.id}')" style="width:${w};flex:0 0 ${w};">
  ${cover(d,110,16,17)}
  <div style="margin-top:8px;"><div class="display" style="font-weight:700;font-size:15px;color:var(--ink);line-height:1.1;">${d.title}</div>
  <div class="mono" style="font-size:11px;color:var(--inkSoft);margin-top:3px;">${d.minutes} min · ${d.level}</div></div></div>`;}

function bigCard(d){const sv=S.saved.has(d.id);return `<div class="card lift" onclick="openDish('${d.id}')">
  <div style="position:relative;">${cover(d,172,0,26)}
    <button class="press" onclick="event.stopPropagation();toggleSave('${d.id}')" aria-label="Save" style="position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:100px;border:none;display:grid;place-items:center;background:${sv?"var(--flame)":"rgba(255,255,255,.92)"};color:${sv?"#fff":"var(--ink)"};box-shadow:0 3px 10px rgba(0,0,0,.18);">${ic("bookmark",{s:17,sw:2.4,f:sv?"#fff":"none"})}</button>
  </div>
  <div style="padding:14px 16px 16px;">${meta(d)}<div style="font-size:14.5px;line-height:1.4;margin-top:8px;font-weight:500;">${d.blurb}</div></div></div>`;}

        <div><span class="eyebrow" style="color:var(--sage)">${HANDLE}</span>
          <div class="display" style="font-weight:800;font-size:40px;letter-spacing:-1.3px;line-height:1;margin-top:6px;">${BRAND}</div>
          <div style="font-size:14px;color:rgba(255,255,255,.7);margin-top:5px;">${TAGLINE}</div></div>
        ${S.pro?`<span class="pro-pill">${ic("crown",{s:11,sw:2.6})} PRO</span>`:`<div style="width:44px;height:44px;border-radius:100px;background:var(--flame);display:grid;place-items:center;">${ic("flame",{s:22,f:"#fff",c:"#fff"})}</div>`}

    </div>

        <div style="width:52px;height:52px;border-radius:14px;background:rgba(232,85,45,.2);display:grid;place-items:center;flex:0 0 52px;">${ic("camera",{s:24,c:"var(--flame)"})}</div>
        <div style="flex:1;"><div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:4px;"><span class="display" style="font-weight:700;font-size:17px;">Scan your fridge</span>${S.pro?"":`<span class="pro-pill">${ic("crown",{s:11,sw:2.6})} PRO</span>`}</div>
        <div style="font-size:13.5px;color:rgba(255,255,255,.72);line-height:1.4;">Get dishes from what you've already got in.</div></div>

      </div>
      <div class="scrollx" style="display:flex;gap:14px;padding-bottom:24px;">${DISHES.slice(0,5).map(d=>miniCard(d,"150px")).join("")}</div>

  </div>`;
}

function searchHTML(){
  return `<div>
    <div style="background:var(--olive);padding:26px 20px 20px;color:#fff;">
      <span class="eyebrow" style="color:var(--sage)">Browse</span>
      <h2 class="display" style="font-weight:800;font-size:30px;letter-spacing:-.8px;margin:6px 0 16px;">Find a dish</h2>
      <div style="display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.12);border-radius:14px;padding:0 14px;">
        ${ic("search",{s:18,c:"rgba(255,255,255,.7)"})}
        <input id="searchInput" oninput="onSearch(this.value)" value="${S.query.replace(/"/g,"&quot;")}" placeholder="Search dishes, techniques…" style="flex:1;background:transparent;border:none;outline:none;color:#fff;font-size:15.5px;padding:14px 0;" />
        ${S.query?`<button onclick="clearSearch()" style="background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);display:grid;place-items:center;">${ic("x",{s:16})}</button>`:""}
      </div>
    </div>
    <div style="padding:18px 20px 0;">
      <div class="scrollx" style="display:flex;gap:8px;padding-bottom:12px;">
        <button class="chip ${S.meal==="all"?"active":""}" onclick="setMeal('all')">All</button>
        ${MEALS.map(m=>`<button class="chip ${S.meal===m.id?"active":""}" onclick="setMeal('${m.id}')">${m.label}</button>`).join("")}
      </div>
      <div class="scrollx" style="display:flex;gap:8px;padding-bottom:16px;">
        <button class="chip ${S.flavor==="all"?"active":""}" onclick="setFlavor('all')">Any</button>
        <button class="chip ${S.flavor==="savoury"?"active":""}" onclick="setFlavor('savoury')">Savoury</button>

      </div>

}
function getResults(){const q=S.query.trim().toLowerCase();return DISHES.filter(d=>{const mq=!q||d.title.toLowerCase().includes(q)||d.blurb.toLowerCase().includes(q)||d.tag.toLowerCase().includes(q);return mq&&(S.meal==="all"||d.meal===S.meal)&&(S.flavor==="all"||d.flavor===S.flavor);});}
function resultsHTML(){
  const r=getResults();
  let out=`<div class="mono" style="font-size:11px;color:var(--inkSoft);margin-bottom:14px;letter-spacing:1px;">${r.length} ${r.length===1?"DISH":"DISHES"}</div>`;
  if(r.length===0) return out+`<div class="up" style="text-align:center;padding:30px 20px;"><div class="display" style="font-weight:700;font-size:19px;">Nothing here yet</div><div style="font-size:14.5px;color:var(--inkSoft);margin-top:6px;">Try a different filter or clear your search.</div></div>`;
  return out+`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">${r.map(d=>miniCard(d,"100%")).join("")}</div>`;
}

  const list=DISHES.filter(d=>S.saved.has(d.id));

    <div style="padding:30px 20px 18px;"><span class="eyebrow">Your kitchen</span><h2 class="display" style="font-weight:800;font-size:34px;margin:6px 0 0;letter-spacing:-.8px;">Saved</h2></div>
    ${list.length===0?`<div class="up" style="padding:40px 30px;text-align:center;"><div style="width:72px;height:72px;border-radius:100px;background:var(--cream);display:grid;place-items:center;margin:0 auto 18px;">${ic("bookmark",{s:30,c:"var(--olive)",sw:2})}</div><div class="display" style="font-weight:700;font-size:20px;">Nothing saved yet</div><div style="font-size:15px;color:var(--inkSoft);margin-top:8px;line-height:1.5;max-width:260px;margin-left:auto;margin-right:auto;">Tap the bookmark on any dish to keep it here for when you're ready to cook.</div></div>`:`<div style="display:flex;flex-direction:column;gap:18px;padding:0 20px 24px;">${list.map(d=>bigCard(d)).join("")}</div>`}
  </div>`;
}

    </div>
  </div>`;
}

  return `<div class="up" style="padding-bottom:120px;">

      <button class="press" onclick="toggleSave('${d.id}')" style="position:absolute;top:16px;right:16px;width:40px;height:40px;border-radius:100px;border:none;background:${sv?"var(--flame)":"rgba(255,255,255,.92)"};color:${sv?"#fff":"var(--ink)"};display:grid;place-items:center;cursor:pointer;box-shadow:0 3px 10px rgba(0,0,0,.2);">${ic("bookmark",{s:18,sw:2.4,f:sv?"#fff":"none"})}</button>
    </div>
    <div style="padding:22px 20px 0;">
      ${meta(d)}
      <p style="font-size:16px;line-height:1.5;margin:12px 0 22px;font-weight:500;">${d.blurb}</p>
      <div class="lift" onclick="appToast()" style="position:relative;height:180px;border-radius:18px;overflow:hidden;background:linear-gradient(135deg,${d.hue[1]},${d.hue[0]});margin-bottom:24px;display:grid;place-items:center;">
        <div style="position:absolute;inset:0;background:rgba(0,0,0,.18);"></div>
        <div style="position:relative;display:flex;flex-direction:column;align-items:center;gap:10px;color:#fff;"><div style="width:58px;height:58px;border-radius:100px;background:rgba(255,255,255,.95);display:grid;place-items:center;box-shadow:0 6px 20px rgba(0,0,0,.3);">${ic("play",{s:24,f:"var(--ink)",c:"var(--ink)"})}</div><span class="mono" style="font-size:12px;font-weight:700;letter-spacing:1px;">WATCH THE 60-SEC VERSION</span></div>
      </div>

      <div class="pop" style="background:var(--oliveDeep);color:var(--cream);border-radius:18px;padding:18px 18px 20px;border-left:4px solid var(--flame);margin-bottom:26px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">${ic("flame",{s:15,c:"var(--flame)",sw:2.6})}<span class="eyebrow" style="color:var(--sage)">The technique</span></div>
        <div class="display" style="font-weight:700;font-size:19px;line-height:1.15;color:#fff;margin-bottom:8px;">${d.technique.title}</div>
        <div style="font-size:14.5px;line-height:1.55;color:rgba(255,255,255,.82);">${d.technique.body}</div>
      </div>

      <div style="position:relative;margin-bottom:28px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
          <h3 class="display" style="font-weight:700;font-size:22px;letter-spacing:-.3px;display:flex;align-items:center;gap:9px;">Nutrition ${S.pro?"":`<span class="pro-pill">${ic("crown",{s:11,sw:2.6})} PRO</span>`}</h3>
          <span class="mono" style="font-size:10px;color:var(--inkSoft);">PER SERVING · EST.</span>
        </div>
        <div style="display:flex;gap:10px;${S.pro?"":"filter:blur(6px);pointer-events:none;user-select:none;"}">
          ${tiles.map(t=>`<div style="flex:1;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;"><div class="mono" style="font-weight:700;font-size:20px;color:var(--olive);">${t[1]}${t[2]}</div><div class="mono" style="font-size:10px;letter-spacing:1px;color:var(--inkSoft);text-transform:uppercase;margin-top:4px;">${t[0]}</div></div>`).join("")}
        </div>
        ${S.pro?"":`<button class="press" onclick="goPro()" style="position:absolute;inset:0;top:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:transparent;border:none;cursor:pointer;"><div style="width:42px;height:42px;border-radius:100px;background:var(--oliveDeep);display:grid;place-items:center;">${ic("lock",{s:18,c:"var(--sage)"})}</div><span class="mono" style="font-size:12px;font-weight:700;letter-spacing:1px;color:var(--oliveDeep);">UNLOCK WITH PRO</span></button>`}
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <h3 class="display" style="font-weight:700;font-size:22px;letter-spacing:-.3px;">Ingredients</h3>
        <div style="display:flex;align-items:center;gap:12px;"><span class="eyebrow" style="color:var(--olive)">Serves</span>

            <button class="press" onclick="setServings(${serv+1})" aria-label="More" style="width:34px;height:34px;border-radius:100px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;color:var(--ink);">${ic("plus",{s:15})}</button>

      <div class="card" style="border-radius:18px;margin-bottom:28px;">

      <div style="display:flex;flex-direction:column;gap:14px;">
        ${d.steps.map((s,i)=>`<div style="display:flex;gap:14px;"><span class="mono" style="font-weight:700;font-size:13px;color:var(--sage);min-width:26px;padding-top:2px;">${String(i+1).padStart(2,"0")}</span><span style="font-size:15px;line-height:1.5;">${s.text}${s.timer>0?` <span class="mono" style="font-size:11px;font-weight:700;color:var(--flame);margin-left:8px;background:rgba(232,85,45,.1);padding:2px 7px;border-radius:100px;white-space:nowrap;">⏱ ${fmt(s.timer)}</span>`:""}</span></div>`).join("")}

      <button class="btn-flame press" onclick="startCook('${d.id}')">${ic("flame",{s:19,f:"#fff"})} START COOKING</button>
    </div>
  </div>`;
}

/* ----------------------------- OVERLAYS ----------------------------- */
function overlayHTML(){
  let h="";
  if(S.cooking) h+=cookHTML(D(S.cooking));
  if(S.showScan) h+=scanHTML();
  if(S.showPro) h+=proHTML();
  return h;
}
function cookHTML(d){
  const i=S.cookStep, step=d.steps[i], last=i===d.steps.length-1;
  return `<div style="position:fixed;inset:0;background:var(--oliveDeep);z-index:60;display:flex;flex-direction:column;color:#fff;">
    <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;">
      <button class="press" onclick="exitCook()" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:8px 14px;border-radius:100px;cursor:pointer;font-family:var(--mono);font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:6px;">${ic("chevron-left",{s:15})} EXIT</button>
      <span class="mono" style="font-size:13px;font-weight:700;letter-spacing:1px;color:var(--sage);">STEP ${String(i+1).padStart(2,"0")} / ${String(d.steps.length).padStart(2,"0")}</span>
    </div>
    <div style="height:4px;background:rgba(255,255,255,.12);margin:0 20px;border-radius:100px;overflow:hidden;"><div style="height:100%;width:${((i+1)/d.steps.length)*100}%;background:var(--flame);transition:width .35s;"></div></div>
    <div class="pop" style="flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 28px;gap:30px;">
      <div class="display" style="font-weight:600;font-size:30px;line-height:1.18;letter-spacing:-.4px;">${step.text}</div>
      ${step.timer>0?timerHTML():""}
    </div>
    <div style="padding:18px 20px 30px;display:flex;gap:12px;">
      <button class="press" onclick="cookPrev()" ${i===0?"disabled":""} style="flex:0 0 56px;height:56px;border-radius:16px;border:1px solid rgba(255,255,255,.22);background:transparent;color:#fff;cursor:${i===0?"default":"pointer"};opacity:${i===0?.35:1};display:grid;place-items:center;">${ic("arrow-left",{s:20})}</button>
      <button class="press" onclick="${last?"exitCook()":"cookNext()"}" style="flex:1;height:56px;border-radius:16px;border:none;cursor:pointer;background:${last?"var(--sage)":"var(--flame)"};color:${last?"var(--oliveDeep)":"#fff"};font-family:var(--mono);font-weight:700;font-size:15px;letter-spacing:1px;display:inline-flex;align-items:center;justify-content:center;gap:10px;">${last?`${ic("check",{s:19,sw:3})} FINISH`:`NEXT STEP ${ic("arrow-right",{s:19})}`}</button>
    </div>
  </div>`;
}
function timerHTML(){
  const R=52,CIRC=2*Math.PI*R;
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:18px;">
    <div style="position:relative;width:140px;height:140px;">
      <svg width="140" height="140" style="transform:rotate(-90deg);"><circle cx="70" cy="70" r="${R}" fill="none" stroke="rgba(255,255,255,.14)" stroke-width="8"></circle><circle id="t-ring" cx="70" cy="70" r="${R}" fill="none" stroke="var(--flame)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${CIRC}" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear;"></circle></svg>
      <div id="t-digits" style="position:absolute;inset:0;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:30px;color:#fff;"></div>
    </div>
    <div style="display:flex;gap:12px;">
      <button id="t-btn" class="press" onclick="toggleTimer()" style="display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:100px;border:none;cursor:pointer;background:var(--flame);color:#fff;font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:1px;"></button>
      <button class="press" onclick="resetTimer()" style="width:44px;border-radius:100px;border:1px solid rgba(255,255,255,.25);cursor:pointer;background:transparent;color:#fff;display:grid;place-items:center;">${ic("rotate-ccw",{s:16})}</button>
    </div>
  </div>`;
}
function scanHTML(){
  let body="";
  if(S.scanPhase==="intro"){
    body=`<div class="up" style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:24px;">
      <div style="width:100%;height:230px;border-radius:20px;background:linear-gradient(160deg,#3C4A2C,#2C361F);display:grid;place-items:center;position:relative;overflow:hidden;margin-bottom:24px;"><div style="width:150px;height:150px;border:2px dashed rgba(255,255,255,.35);border-radius:18px;"></div><div style="position:absolute;">${ic("camera",{s:40,c:"rgba(255,255,255,.6)"})}</div></div>
      <h2 class="display" style="font-weight:800;font-size:26px;letter-spacing:-.5px;">What's in your fridge?</h2>
      <p style="font-size:15px;color:var(--inkSoft);line-height:1.5;margin:10px 0 24px;max-width:300px;">Point your camera at the shelf. MISE spots the ingredients and suggests what you can cook right now.</p>
      <button class="btn-flame press" onclick="scanGo()">${ic("camera",{s:19})} START SCAN</button>
    </div>`;
  } else if(S.scanPhase==="scanning"){
    const em=["🍅","🧄","🥚","🍞","🫒","🧅"];
    body=`<div style="padding-top:24px;"><div style="width:100%;height:280px;border-radius:20px;background:linear-gradient(160deg,#3C4A2C,#2C361F);position:relative;overflow:hidden;">
      <div style="position:absolute;left:6%;right:6%;height:3px;background:var(--flame);box-shadow:0 0 16px var(--flame);border-radius:100px;animation:scanline 1.4s ease-in-out infinite alternate;"></div>
      ${em.map((e,i)=>`<span style="position:absolute;font-size:26px;opacity:.85;left:${15+(i%3)*30}%;top:${20+Math.floor(i/3)*42}%;animation:pulse 1.2s infinite;animation-delay:${i*120}ms;">${e}</span>`).join("")}
    </div><div class="mono" style="text-align:center;margin-top:22px;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--olive);animation:pulse 1.2s infinite;">SCANNING…</div></div>`;
  } else {
    const active=Object.keys(S.found).filter(k=>S.found[k]);
    const matches=DISHES.map(d=>{const names=d.ingredients.map(i=>i.name.toLowerCase());return {d,count:active.filter(k=>names.some(n=>n.includes(k))).length};}).filter(m=>m.count>0).sort((a,b)=>b.count-a.count);
    body=`<div class="up"><span class="eyebrow" style="color:var(--olive)">Spotted in your fridge</span>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 26px;">${Object.keys(S.found).map(k=>`<button class="press" onclick="toggleFound('${k}')" style="font-weight:600;font-size:13.5px;padding:8px 14px;border-radius:100px;cursor:pointer;border:1px solid ${S.found[k]?"var(--olive)":"var(--line)"};background:${S.found[k]?"var(--olive)":"var(--card)"};color:${S.found[k]?"#fff":"var(--inkSoft)"};text-transform:capitalize;display:inline-flex;align-items:center;gap:6px;">${S.found[k]?ic("check",{s:13,sw:3}):""}${k}</button>`).join("")}</div>
      <h3 class="display" style="font-weight:800;font-size:22px;letter-spacing:-.4px;margin-bottom:14px;">${matches.length} dishes you can make</h3>
      <div style="display:flex;flex-direction:column;gap:12px;">${matches.map(({d,count})=>`<div class="lift" onclick="openFromScan('${d.id}')" style="display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;align-items:center;"><div style="width:60px;height:60px;border-radius:12px;flex:0 0 60px;background:linear-gradient(135deg,${d.hue[0]},${d.hue[1]});"></div><div style="flex:1;"><div class="display" style="font-weight:700;font-size:16px;">${d.title}</div><div class="mono" style="font-size:11px;color:var(--flame);margin-top:3px;">USES ${count} OF YOUR INGREDIENTS</div></div>${ic("arrow-right",{s:18,c:"var(--inkSoft)"})}</div>`).join("")}</div>
    </div>`;
  }
  return `<div style="position:fixed;inset:0;background:var(--paper);z-index:65;display:flex;flex-direction:column;max-width:480px;margin:0 auto;">
    <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;background:var(--oliveDeep);color:#fff;"><div style="display:inline-flex;align-items:center;gap:8px;">${ic("camera",{s:18,c:"var(--sage)"})}<span class="mono" style="font-size:13px;font-weight:700;letter-spacing:1px;">FRIDGE SCAN</span></div><button class="press" onclick="closeScan()" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:100px;display:grid;place-items:center;cursor:pointer;">${ic("x",{s:16})}</button></div>
    <div style="flex:1;overflow-y:auto;padding:20px;">${body}</div>
  </div>`;
}
function proHTML(){
  const perks=[["zap","Calories & macros","Per-serving nutrition on every dish."],["camera","Scan your fridge","Snap what you've got, get dishes you can make now."],["sparkles","Portion scaling","Macros that follow your serving size."]];
  return `<div onclick="closePro()" style="position:fixed;inset:0;z-index:70;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(20,18,14,.55);">
    <div class="sheet" onclick="event.stopPropagation()" style="background:var(--oliveDeep);border-radius:26px 26px 0 0;padding:26px 22px 30px;color:#fff;max-width:480px;margin:0 auto;width:100%;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><div style="display:inline-flex;align-items:center;gap:8px;">${ic("crown",{s:18,c:"var(--sage)"})}<span class="eyebrow" style="color:var(--sage)">${BRAND} Pro</span></div><button class="press" onclick="closePro()" style="background:rgba(255,255,255,.12);border:none;color:#fff;width:32px;height:32px;border-radius:100px;display:grid;place-items:center;cursor:pointer;">${ic("x",{s:16})}</button></div>
      <h2 class="display" style="font-weight:800;font-size:28px;letter-spacing:-.6px;line-height:1.05;margin:4px 0 18px;">Cook smarter, not just tastier.</h2>
      <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:22px;">${perks.map(p=>`<div style="display:flex;gap:14px;align-items:flex-start;"><div style="width:40px;height:40px;border-radius:12px;background:rgba(167,176,136,.18);display:grid;place-items:center;flex:0 0 40px;">${ic(p[0],{s:19,c:"var(--sage)"})}</div><div><div style="font-weight:700;font-size:15.5px;">${p[1]}</div><div style="font-size:13.5px;color:rgba(255,255,255,.7);line-height:1.4;">${p[2]}</div></div></div>`).join("")}</div>
      <button class="btn-flame press" onclick="unlockPro()">Go Pro · ${PRO_PRICE}/mo</button>
      <div style="text-align:center;font-family:var(--mono);font-size:10.5px;color:rgba(255,255,255,.4);margin-top:12px;">DEMO — UNLOCKS INSTANTLY HERE</div>
    </div>
  </div>`;
}

/* ------------------------------- NAV -------------------------------- */
function navHTML(){
  const items=[["home","home","HOME"],["search","search","BROWSE"],["saved","bookmark","SAVED"],["about","user","ME"]];
  return `<div class="nav">${items.map(([id,icn,l])=>{const a=S.tab===id&&!S.openId;return `<button class="navbtn ${a?"active":""}" onclick="setTab('${id}')">${ic(icn,{s:21,sw:a?2.6:2,f:a&&id==="saved"?"#fff":"none"})}<span>${l}</span>${a?'<div class="navdot"></div>':""}</button>`;}).join("")}</div>`;
}

/* ----------------------------- ACTIONS ------------------------------ */
function render(){
  document.getElementById("screen").innerHTML=screenHTML();
  document.getElementById("nav").innerHTML=navHTML();
  document.getElementById("overlay").innerHTML=overlayHTML();
  if(S.cooking) mountTimer();
}
function nav(){render();window.scrollTo(0,0);}
function setTab(t){S.openId=null;S.tab=t;nav();}
function openDish(id){S.openId=id;S.servings=null;nav();}
function back(){S.openId=null;nav();}
function toggleSave(id){S.saved.has(id)?S.saved.delete(id):S.saved.add(id);render();}
function markCooked(id){S.cooked.has(id)?S.cooked.delete(id):S.cooked.add(id);render();}
function setServings(v){S.servings=Math.max(1,v);render();}
function goPro(){S.showPro=true;render();}
function closePro(){S.showPro=false;render();}
function unlockPro(){S.pro=true;S.showPro=false;render();}
function openScan(){if(S.pro){S.showScan=true;S.scanPhase="intro";render();}else goPro();}
function closeScan(){S.showScan=false;render();}
function scanGo(){S.scanPhase="scanning";render();setTimeout(()=>{S.scanPhase="results";render();},1700);}
function toggleFound(k){S.found[k]=!S.found[k];render();}
function openFromScan(id){S.showScan=false;S.openId=id;S.servings=null;nav();}
function goCategory(m){S.meal=m;S.flavor="all";S.query="";S.tab="search";S.openId=null;nav();}
function setMeal(m){S.meal=m;render();}
function setFlavor(f){S.flavor=f;render();}
function clearSearch(){S.query="";render();}
function onSearch(v){S.query=v;document.getElementById("results").innerHTML=resultsHTML();}
function startCook(id){S.cooking=id;S.cookStep=0;render();}
function exitCook(){clearInterval(T.id);S.cooking=null;render();}
function cookNext(){clearInterval(T.id);S.cookStep++;render();}
function cookPrev(){clearInterval(T.id);S.cookStep--;render();}

/* TIMER */
function mountTimer(){
  const d=D(S.cooking),step=d.steps[S.cookStep];
  if(!step||step.timer<=0)return;
  clearInterval(T.id);T.total=step.timer;T.left=step.timer;T.running=false;T.done=false;
  paintTimer();
}
function paintTimer(){
  const dg=document.getElementById("t-digits"),ring=document.getElementById("t-ring"),btn=document.getElementById("t-btn");
  if(!dg)return;
  const R=52,CIRC=2*Math.PI*R,pct=T.total?T.left/T.total:0;
  dg.textContent=T.done?"DONE":fmt(T.left);
  dg.style.color=T.done?"var(--sage)":"#fff";
  dg.style.animation=T.done?"pulse 1s infinite":"none";
  ring.setAttribute("stroke",T.done?"var(--sage)":"var(--flame)");
  ring.setAttribute("stroke-dashoffset",CIRC*(1-pct));
  btn.innerHTML=T.running?`${ic("pause",{s:15})} PAUSE`:`${ic("play",{s:15,f:"#fff"})} ${T.done?"AGAIN":"START"}`;
}
function toggleTimer(){
  if(T.done){T.left=T.total;T.done=false;}
  T.running=!T.running;
  clearInterval(T.id);
  if(T.running){T.id=setInterval(()=>{T.left--;if(T.left<=0){T.left=0;T.running=false;T.done=true;clearInterval(T.id);beep();try{navigator.vibrate&&navigator.vibrate(400);}catch(e){}}paintTimer();},1000);}
  paintTimer();
}
function resetTimer(){clearInterval(T.id);T.left=T.total;T.running=false;T.done=false;paintTimer();}

/* TOAST */
let toastT;
function appToast(){const t=document.getElementById("toast");t.textContent="🚀 Launching soon — follow for the drop";t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}

/* MARQUEE build (duplicate for seamless loop) */
(function(){
  const msg=`📱 Download the ${BRAND} app — cook along with every video  •  new dish every week  •  ${HANDLE}  •  `;
  document.getElementById("mq").innerHTML=`<span>${msg}</span><span>${msg}</span>`;
})();

render();
</script>
</body>
</html>
