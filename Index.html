const ic=(n,o={})=>{const s=o.s||18;return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="${o.f||'none'}" stroke="currentColor" stroke-width="${o.sw||2}" stroke-linecap="round" stroke-linejoin="round"${o.c?` style="color:${o.c}"`:''}>${ICONS[n]||''}</svg>`;};
const scaleQty=(q,b,sv)=>q==null?null:Math.round(((q*sv)/b)*100)/100;
const fmt=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
const D=(id)=>DISHES.find(d=>d.id===id);
function beep(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type="sine";o.frequency.value=880;g.gain.setValueAtTime(.001,c.currentTime);g.gain.exponentialRampToValueAtTime(.3,c.currentTime+.02);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.5);o.start();o.stop(c.currentTime+.5);}catch(e){}}

function glassLogo(size){
  const s=size||44;
  return `<div style="position:relative;width:${s}px;height:${s}px;border-radius:100px;background:rgba(255,255,255,.35);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.7);box-shadow:0 6px 18px rgba(27,59,140,.25), inset 0 1px 0 rgba(255,255,255,.8);display:grid;place-items:center;overflow:hidden;">
    <div style="position:absolute;inset:0;background:linear-gradient(135deg,rgba(27,59,140,.28),rgba(92,138,201,.18));"></div>
    <div style="position:absolute;top:-30%;left:-20%;width:70%;height:70%;background:rgba(255,255,255,.55);border-radius:100px;filter:blur(6px);transform:rotate(-30deg);"></div>
    <svg viewBox="0 0 24 24" width="${Math.round(s*.5)}" height="${Math.round(s*.5)}" style="position:relative;" fill="url(#flameGrad)" stroke="rgba(255,255,255,.5)" stroke-width="1">
      <defs><linearGradient id="flameGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3E63B5"/><stop offset="100%" stop-color="#14213D"/></linearGradient></defs>
      ${ICONS.flame}
    </svg>
  </div>`;
}

const imgFor=(d)=>`https://image.pollinations.ai/prompt/${encodeURIComponent(d.title+", appetizing food photography, natural light, close up"+(d.flavor==="sweet"?", dessert":""))}?width=800&height=600&nologo=true&seed=${d.id.length*7}`;

const cover=(d,h,r,fs)=>{
  const src=d.img||imgFor(d);
  return `<div style="position:relative;height:${h}px;border-radius:${r}px;overflow:hidden;background-color:${d.hue[0]};background-image:linear-gradient(to top,rgba(0,0,0,.5),rgba(0,0,0,.05) 55%),url('${src}');background-size:cover;background-position:center;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;">
  <div class="sheen"></div>
  <div style="position:absolute;top:12px;left:12px;font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:#fff;background:rgba(255,255,255,.22);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.35);padding:4px 9px;border-radius:100px;">${d.tag}</div>
  <div style="position:relative;font-family:var(--display);font-weight:700;color:#fff;line-height:1.02;font-size:${fs}px;letter-spacing:-.5px;text-shadow:0 1px 12px rgba(0,0,0,.4);">${d.title}</div>
</div>`;
};
const meta=(d)=>`<div class="meta"><span class="i">${ic("clock",{s:13,sw:2.4})} ${d.minutes} min</span><span style="opacity:.4">·</span><span class="i">${ic("flame",{s:13,sw:2.4})} ${d.level}</span></div>`;

  <div class="mono" style="font-size:11px;color:var(--inkSoft);margin-top:3px;">${d.minutes} min · ${d.level}</div></div></div>`;}

function bigCard(d){const sv=S.saved.has(d.id);return `<div class="card lift" onclick="openDish('${d.id}')">
  <div style="position:relative;">${cover(d,172,0,26)}
    <button class="press" onclick="event.stopPropagation();toggleSave('${d.id}')" aria-label="Save" style="position:absolute;top:12px;right:12px;width:38px;height:38px;border-radius:100px;border:1px solid rgba(255,255,255,.5);display:grid;place-items:center;background:${sv?"rgba(27,59,140,.9)":"rgba(255,255,255,.55)"};backdrop-filter:blur(8px);color:${sv?"#fff":"var(--ink)"};box-shadow:0 3px 10px rgba(0,0,0,.15);">${ic("bookmark",{s:17,sw:2.4,f:sv?"#fff":"none"})}</button>

function getResults(){const q=S.query.trim().toLowerCase();return DISHES.filter(d=>{const mq=!q||d.title.toLowerCase().includes(q)||d.blurb.toLowerCase().includes(q)||d.tag.toLowerCase().includes(q);return mq&&(S.meal==="all"||d.meal===S.meal)&&(S.flavor==="all"||d.flavor===S.flavor);});}
function resultsHTML(){
  const r=getResults();
  let out=`<div class="mono" style="font-size:11px;color:var(--inkSoft);margin-bottom:14px;letter-spacing:1px;">${r.length} ${r.length===1?"DISH":"DISHES"}</div>`;
  if(r.length===0) return out+`<div class="up glasspanel" style="text-align:center;padding:30px 20px;border-radius:20px;"><div class="display" style="font-weight:700;font-size:19px;color:var(--oliveDeep);">Nothing here yet</div><div style="font-size:14.5px;color:var(--inkSoft);margin-top:6px;">Try a different filter or clear your search.</div></div>`;

  const sv=S.saved.has(d.id), ck=S.cooked.has(d.id), serv=S.servings||d.base;
  const tiles=[["kcal",d.nutrition.kcal,""],["fat",d.nutrition.fat,"g"],["carbs",d.nutrition.carbs,"g"],["protein",d.nutrition.protein,"g"]];

  return `<div onclick="closeLogin()" style="position:fixed;inset:0;z-index:75;display:flex;flex-direction:column;justify-content:flex-end;background:rgba(15,24,48,.45);backdrop-filter:blur(4px);">
    <div class="sheet" onclick="event.stopPropagation()" style="background:rgba(15,24,48,.92);backdrop-filter:blur(24px) saturate(160%);border-radius:28px 28px 0 0;padding:26px 22px 30px;color:#fff;max-width:480px;margin:0 auto;width:100%;border:1px solid rgba(255,255,255,.15);border-bottom:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
        <div style="display:inline-flex;align-items:center;gap:8px;">${ic("lock",{s:18,c:"var(--sage)"})}<span class="eyebrow">Log in</span></div>
        <button class="press" onclick="closeLogin()" style="background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:#fff;width:32px;height:32px;border-radius:100px;display:grid;place-items:center;cursor:pointer;">${ic("x",{s:16})}</button>
      </div>
      ${body}
    </div>
  </div>`;
}

/* ------------------------------- NAV -------------------------------- */
function navHTML(){
  const items=[["home","home","HOME"],["search","search","BROWSE"],["saved","bookmark","SAVED"],["about","user","ME"]];
  return `<div class="nav">${items.map(([id,icn,l])=>{const a=S.tab===id&&!S.openId;const badge=(id==="saved"&&S.saved.size)?`<span class="navbadge">${S.saved.size}</span>`:"";return `<button class="navbtn ${a?"active":""}" onclick="setTab('${id}')">${ic(icn,{s:21,sw:a?2.6:2,f:a&&id==="saved"?"var(--oliveDeep)":"none"})}<span>${l}</span>${a?'<div class="navdot"></div>':""}${badge}</button>`;}).join("")}</div>`;
}

/* ----------------------------- ACTIONS ------------------------------ */
function render(){
  document.getElementById("screen").innerHTML=screenHTML();
  document.getElementById("nav").innerHTML=navHTML();
  document.getElementById("overlay").innerHTML=overlayHTML();
  if(S.cooking) mountTimer();
}
function nav(){render();window.scrollTo(0,0);}
function setTab(t){if(t==="saved"&&!ensureLogin())return;S.openId=null;S.tab=t;nav();}
function openDish(id){S.openId=id;S.servings=null;nav();}
function back(){S.openId=null;nav();}
function toggleSave(id){if(!ensureLogin())return;S.saved.has(id)?S.saved.delete(id):S.saved.add(id);render();}
function markCooked(id){if(!ensureLogin())return;S.cooked.has(id)?S.cooked.delete(id):S.cooked.add(id);render();}
function setServings(v){S.servings=Math.max(1,v);render();}
function goPro(){if(!ensureLogin())return;S.showPro=true;render();}
function closePro(){S.showPro=false;render();}
function unlockPro(){
  if(!PRO_PAYMENT_LINK){appToast("Add your Stripe link to PRO_PAYMENT_LINK");return;}
  let url=PRO_PAYMENT_LINK;
  const params=[];
  if(S.userEmail) params.push("prefilled_email="+encodeURIComponent(S.userEmail));
  if(supa){
    supa.auth.getUser().then(({data})=>{
      const uid=data&&data.user?data.user.id:null;
      if(uid) params.push("client_reference_id="+encodeURIComponent(uid));
      window.location.href=url+(params.length?(url.includes("?")?"&":"?")+params.join("&"):"");
    }).catch(()=>{ window.location.href=url+(params.length?(url.includes("?")?"&":"?")+params.join("&"):""); });
  } else {
    window.location.href=url+(params.length?(url.includes("?")?"&":"?")+params.join("&"):"");
  }
}
function openScan(){if(!ensureLogin())return;if(S.pro){S.showScan=true;S.scanPhase="intro";render();}else goPro();}
function closeScan(){S.showScan=false;render();}
function ensureLogin(){if(S.loggedIn)return true;S.showLogin=true;S.authSent=false;S.authError="";render();return false;}
function closeLogin(){S.showLogin=false;render();}

/* ---- real Supabase magic-link auth ---- */
function sendMagicLink(){
  const input=document.getElementById("loginEmail");
  const email=input?input.value.trim():"";
  S.authError="";
  if(!email||!email.includes("@")){S.authError="Enter a valid email.";render();return;}
  if(!supa){S.authError="Auth isn't configured yet — missing Supabase keys.";render();return;}
  S.authBusy=true;render();
  supa.auth.signInWithOtp({
    email,
    options:{emailRedirectTo:window.location.origin+window.location.pathname}
  }).then(({error})=>{
    S.authBusy=false;
    if(error){S.authError=error.message;render();return;}
    S.userEmail=email;S.authSent=true;render();
  }).catch(err=>{S.authBusy=false;S.authError=String(err);render();});
}
function doLogout(){
  if(supa) supa.auth.signOut();
  S.loggedIn=false;S.pro=false;S.userEmail="";S.tab="home";S.openId=null;
  render();
}

/* fetch or create a profile row for the signed-in user, and read is_pro */
async function syncProfile(user){
  if(!supa||!user) return;
  try{
    let {data:profile,error}=await supa.from("profiles").select("*").eq("id",user.id).maybeSingle();
    if(!profile){
      const ins=await supa.from("profiles").insert({id:user.id,email:user.email,is_pro:false}).select().maybeSingle();
      profile=ins.data;
    }
    S.pro=!!(profile&&profile.is_pro);
  }catch(e){ /* table may not exist yet — fail quietly, app still works without Pro persistence */ }
  render();
}

/* called once on load: wires up Supabase auth state + checks for a Stripe success redirect */
async function initAuth(){
  if(!SUPABASE_URL||!SUPABASE_ANON_KEY||typeof window.supabase==="undefined"){
    render();
    return;
  }
  supa=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

  supa.auth.onAuthStateChange((event,session)=>{
    if(session&&session.user){
      S.loggedIn=true;S.userEmail=session.user.email;S.showLogin=false;S.authSent=false;
      syncProfile(session.user);
    } else if(event==="SIGNED_OUT"){
      S.loggedIn=false;S.pro=false;S.userEmail="";
      render();
    }
  });

  const {data:{session}}=await supa.auth.getSession();
  if(session&&session.user){
    S.loggedIn=true;S.userEmail=session.user.email;
    await syncProfile(session.user);
  }

  /* Stripe Payment Link can redirect back here with ?pro=success after a real payment.
     Configure this in Stripe: Payment Link -> After payment -> redirect to your site URL + "?pro=success".
     NOTE: this client-side flag is a convenience for immediate UI feedback. For Pro status that can't be
     spoofed by editing the URL, set up a Stripe webhook -> Supabase Edge Function that flips is_pro
     server-side using the client_reference_id we attach to the checkout link in unlockPro(). */
  const params=new URLSearchParams(window.location.search);
  if(params.get("pro")==="success"){
    if(S.loggedIn){
      const {data:{user}}=await supa.auth.getUser();
      if(user){
        await supa.from("profiles").update({is_pro:true}).eq("id",user.id);
        S.pro=true;
        appToast("🎉 Welcome to MISE Pro!");
      }
    }
    params.delete("pro");
    const clean=window.location.pathname+(params.toString()?"?"+params.toString():"");
    window.history.replaceState({},"",clean);
  }

  render();
}

function scanGo(){S.scanPhase="scanning";render();setTimeout(()=>{S.scanPhase="results";render();},1700);}
function toggleFound(k){S.found[k]=!S.found[k];render();}
function openFromScan(id){S.showScan=false;S.openId=id;S.servings=null;nav();}
function goCategory(m){S.meal=m;S.flavor="all";S.query="";S.tab="search";S.openId=null;nav();}
function setMeal(m){S.meal=m;render();}
function setFlavor(f){S.flavor=f;render();}
function clearSearch(){S.query="";render();}
function onSearch(v){S.query=v;document.getElementById("results").innerHTML=resultsHTML();}
function startCook(id){if(!ensureLogin())return;S.cooking=id;S.cookStep=0;render();}
function exitCook(){clearInterval(T.id);S.cooking=null;render();}
function cookNext(){clearInterval(T.id);S.cookStep++;render();}
function cookPrev(){clearInterval(T.id);S.cookStep--;render();}

/* TIMER */
function mountTimer(){
  const d=D(S.cooking),step=d.steps[S.cookStep];
  if(!step||step.timer<=0)return;
  clearInterval(T.id);T.total=step.timer;T.left=step.timer;T.running=false;T.done=false;
  paintTimer();
}
function paintTimer(){
  const dg=document.getElementById("t-digits"),ring=document.getElementById("t-ring"),btn=document.getElementById("t-btn");
  if(!dg)return;
  const R=52,CIRC=2*Math.PI*R,pct=T.total?T.left/T.total:0;
  dg.textContent=T.done?"DONE":fmt(T.left);
  dg.style.color=T.done?"var(--sage)":"#fff";
  dg.style.animation=T.done?"pulse 1s infinite":"none";
  ring.setAttribute("stroke",T.done?"var(--sage)":"var(--flame)");
  ring.setAttribute("stroke-dashoffset",CIRC*(1-pct));
  btn.innerHTML=T.running?`${ic("pause",{s:15})} PAUSE`:`${ic("play",{s:15,f:"#fff"})} ${T.done?"AGAIN":"START"}`;
}
function toggleTimer(){
  if(T.done){T.left=T.total;T.done=false;}
  T.running=!T.running;
  clearInterval(T.id);
  if(T.running){T.id=setInterval(()=>{T.left--;if(T.left<=0){T.left=0;T.running=false;T.done=true;clearInterval(T.id);beep();try{navigator.vibrate&&navigator.vibrate(400);}catch(e){}}paintTimer();},1000);}
  paintTimer();
}
function resetTimer(){clearInterval(T.id);T.left=T.total;T.running=false;T.done=false;paintTimer();}

/* TOAST */
let toastT;
function appToast(msg){const t=document.getElementById("toast");t.textContent=msg||"🚀 Launching soon — follow for the drop";t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2600);}

(function(){
  const msg=`📱 Download the ${BRAND} app — cook along with every video  •  new dish every week  •  ${HANDLE}  •  `;
  document.getElementById("mq").innerHTML=`<span>${msg}</span><span>${msg}</span>`;
})();

initAuth();
</script>
